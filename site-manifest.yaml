prohibited_features:
  - raw_ip
  - device_fingerprint
  - canvas_fingerprint
  - audio_fingerprint
  - webgl_renderer
  - font_enumeration
  - installed_plugins
  - exact_location_persistence
  - email
  - phone
  - crm_identity
  - customer_identity
  - cross_site_history
  - purchased_enrichment
  - race_or_ethnicity
  - religion
  - political_affiliation
  - health_or_disability
  - sexual_orientation
  - union_membership
  - creditworthiness
  - inferred_income
  - vulnerability_score

candidates:
  - id: generic-baseline
    title: "Generic request mirror"
    evidence_level: product_demonstration
    route_ids: [lab]
    facets:
      route: [lab]
      audience: [general]
      intent: [inspect_request]
      proof_type: [diagnostic]
      trust_concern: [transparency]
    business_prior: 0.60
    graph_prior: 0.80
    content_file: "content/slices/generic-baseline.mdx"

  - id: residential-family-dog
    title: "Residential family and dog-owner slice"
    evidence_level: product_demonstration
    route_ids: [lab]
    required_features:
      any: [explicit.homeowner, intent.residential_painting]
    facets:
      route: [lab]
      audience: [homeowner, family_household, dog_owner]
      intent: [residential_painting]
      proof_type: [residential_example]
      trust_concern: [home_reputation]
    business_prior: 0.50
    graph_prior: 0.62
    content_file: "content/slices/residential-family-dog.mdx"

  - id: commercial-fleet-ny
    title: "New York commercial fleet slice"
    evidence_level: product_demonstration
    route_ids: [lab]
    required_features:
      all: [explicit.commercial_fleet_operator, intent.commercial_fleet_service]
    facets:
      route: [lab]
      audience: [business_owner]
      industry: [commercial_fleet_operator]
      intent: [commercial_fleet_service]
      region: [us_northeast]
      proof_type: [commercial_example]
    business_prior: 0.55
    graph_prior: 0.60
    content_file: "content/slices/commercial-fleet-ny.mdx"

  - id: contractor-estimate-evening
    title: "Contractor estimate and follow-up slice"
    evidence_level: source_wired_preview
    route_ids: [lab]
    required_features:
      any: [explicit.painting_contractor, intent.contractor_estimate_followup]
    facets:
      route: [lab]
      audience: [business_owner, contractor]
      industry: [painting_contractor]
      intent: [contractor_estimate_followup]
      job_stage: [estimating, followup]
      proof_type: [work_card]
      trust_concern: [owner_approval]
      daypart: [evening]
    business_prior: 0.70
    graph_prior: 0.55
    content_file: "content/slices/contractor-estimate-evening.mdx"

  - id: technical-security-first
    title: "Technical security-first slice"
    evidence_level: source_wired_preview
    route_ids: [lab]
    required_features:
      any: [trust.security_first]
    facets:
      route: [lab]
      audience: [technical_buyer]
      intent: [evaluate_architecture]
      proof_type: [boundary_diagram]
      trust_concern: [security_first, credential_custody, owner_approval]
    business_prior: 0.45
    graph_prior: 0.70
    content_file: "content/slices/technical-security-first.mdx"

fixtures:
  - id: generic-baseline
    description: "No optional context. Must fall back to generic."
    features:
      route.lab: 1.0
      source.direct: 0.2
    expected_top: generic-baseline

  - id: homeowner-family-dog-residential
    description: "Explicit synthetic residential test; none of these traits are inferred."
    features:
      route.lab: 1.0
      explicit.homeowner: 1.0
      explicit.family_household: 1.0
      explicit.dog_owner: 1.0
      intent.residential_painting: 1.0
      region.us_west: 0.3
    expected_top: residential-family-dog

  - id: ny-commercial-fleet
    description: "Explicit commercial fleet test with Northeast region."
    features:
      route.lab: 1.0
      explicit.business_owner: 1.0
      explicit.commercial_fleet_operator: 1.0
      intent.commercial_fleet_service: 1.0
      region.us_northeast: 0.3
      device.desktop: 0.2
    expected_top: commercial-fleet-ny

  - id: contractor-estimate-evening
    description: "Painting contractor with estimate/follow-up need in evening context."
    features:
      route.lab: 1.0
      explicit.business_owner: 1.0
      explicit.painting_contractor: 1.0
      intent.contractor_estimate_followup: 1.0
      daypart.evening: 0.2
      device.mobile: 0.2
    expected_top: contractor-estimate-evening

  - id: technical-security-first
    description: "Explicit technical evaluator prioritizing security boundaries."
    features:
      route.lab: 1.0
      trust.security_first: 1.0
      device.desktop: 0.2
    expected_top: technical-security-first

experiments:
  v0_1_engine:
    arms:
      - id: js-reference
        weight: 0.50
      - id: zig-wasm
        weight: 0.50
    assignment_scope: request
    conversion_metrics: []
    purpose: "Correctness and latency comparison only."

headers:
  response:
    X-Robots-Tag: "noindex, nofollow"
    Cache-Control: "private, no-store"
    Referrer-Policy: "strict-origin-when-cross-origin"
    X-Content-Type-Options: "nosniff"
    Content-Security-Policy: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'self'"
    Permissions-Policy: "camera=(), microphone=(), geolocation=(), interest-cohort=(), browsing-topics=(), run-ad-auction=(), join-ad-interest-group=()"

performance_budgets:
  resolver_compute_p95_ms: 10
  resolver_total_overhead_p95_ms: 50
  resolver_total_overhead_hard_p95_ms: 80
  remote_match_calls: 0
  wasm_must_beat_js_p95_percent: 20

validation:
  required_documents:
    - "04-feature-validation-vectors.md"
    - "05-pass-fail-vectors.md"
    - "07-v0.1-request-mirror-lab.md"
    - "RESEARCH-NOTES-2026-07-17.md"
  production_ready: false
  graduation_stage: 0
