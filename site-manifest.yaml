  - id: explicit.business_owner
    role: audience
    value: business_owner
    source: explicit_input
    direct_or_inferred: direct
    entropy: low
    sensitive: false
    consent_tier: 1
    default_weight: 1.0
    affects: [ranking, ordering, example, cta]

  - id: explicit.painting_contractor
    role: industry
    value: painting_contractor
