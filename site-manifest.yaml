version: "0.1.0"
status: research_only
updated_at: "2026-07-17"

runtime:
  canonical_stack:
    application: "Next.js 16+ App Router with Cache Components"
    edge_resolver: "Cloudflare Worker"
    language: "TypeScript"
    math_core: "Zig -> precompiled WASM with TypeScript reference fallback"
    content: "typed MDX/content compiler; Contentlayer requires compatibility proof"
  v0_1:
    application: "Cloudflare Worker native diagnostic HTML"
    index_policy: "noindex,nofollow"
    cache_policy: "private,no-store"
    remote_match_calls: 0

vector:
  candidate_dimensions: [512, 1024, 2048, 4096]
  initial_dimension: 2048
  storage: f32
  request_time_fft: false
  normalization: l2
  deterministic_seed_namespace: "amtech-holo-v0.1"
  similarity: cosine
  candidate_search: flat_exact

score:
  initial_experiment_weights:
    hrr: 0.50
    graph: 0.30
    business_prior: 0.20
  note: "Experimental priors, not scientifically established constants."
  hard_gates:
    - route_eligible
    - evidence_eligible
    - privacy_eligible
    - claim_eligible
    - fixture_valid
  confidence:
    minimum_score: 0.45
    minimum_top_two_margin: 0.05
    minimum_feature_count: 1
    fallback_candidate: generic-baseline

feature_sources:
  request:
    consent_tier: 0
    ttl_seconds: 0
  cloudflare:
    consent_tier: 0
    ttl_seconds: 0
  browser_opt_in:
    consent_tier: 1
    ttl_seconds: 0
  explicit_input:
    consent_tier: 1
    ttl_seconds: 86400
  session_opt_in:
    consent_tier: 2
    ttl_seconds: 86400

features:
  - id: route.lab
    role: route
    value: lab
    source: request
    direct_or_inferred: direct
    entropy: low
    sensitive: false
    consent_tier: 0
    default_weight: 1.0
    affects: [ranking]

  - id: source.direct
    role: source
    value: direct
    source: request
    direct_or_inferred: direct
    entropy: low
    sensitive: false
    consent_tier: 0
    default_weight: 0.20
    affects: [ranking]

  - id: source.organic_search
    role: source
    value: organic_search
    source: request
    direct_or_inferred: inferred
    entropy: low
    sensitive: false
    consent_tier: 0
    default_weight: 0.50
    affects: [ranking]

  - id: region.us_west
    role: region
    value: us_west
    source: cloudflare
    direct_or_inferred: inferred
    entropy: low
    sensitive: false
    consent_tier: 0
    default_weight: 0.30
    affects: [ranking]

  - id: region.us_northeast
    role: region
    value: us_northeast
    source: cloudflare
    direct_or_inferred: inferred
    entropy: low
    sensitive: false
    consent_tier: 0
    default_weight: 0.30
    affects: [ranking]

  - id: device.mobile
    role: device_class
    value: mobile
    source: browser_opt_in
    direct_or_inferred: inferred
    entropy: low
    sensitive: false
    consent_tier: 1
    default_weight: 0.20
    affects: [ordering, example]

  - id: device.desktop
    role: device_class
    value: desktop
    source: browser_opt_in
    direct_or_inferred: inferred
    entropy: low
    sensitive: false
    consent_tier: 1
    default_weight: 0.20
    affects: [ordering, example]

  - id: daypart.evening
    role: daypart
    value: evening
    source: cloudflare
    direct_or_inferred: inferred
    entropy: low
    sensitive: false
    consent_tier: 0
    default_weight: 0.20
    affects: [example]

  - id: explicit.homeowner
    role: audience
    value: homeowner
    source: explicit_input
    direct_or_inferred: direct
    entropy: low
    sensitive: false
    consent_tier: 1
    default_weight: 1.0
    affects: [ranking, ordering, example]

  - id: explicit.family_household
    role: household_context
    value: family_household
