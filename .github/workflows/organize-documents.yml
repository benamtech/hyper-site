name: Organize Repository Documents

on:
  workflow_dispatch:
  push:
    branches: ["agent/glm-blackwell-vertical-slice"]
    paths:
      - ".github/workflows/organize-documents.yml"
      - "docs/legacy-root-moves.json"
      - "scripts/apply-doc-moves.mjs"
      - "scripts/check-declared-doc-moves.mjs"
      - "scripts/organize-legacy-memory.mjs"
      - "scripts/organize-root-docs.mjs"
      - "scripts/normalize-doc-paths.mjs"
      - "scripts/ensure-doc-index-links.mjs"
      - "scripts/check-doc-system.mjs"
      - "docs/test/doc-system.test.mjs"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/organize-documents.yml"
      - "docs/legacy-root-moves.json"
      - "scripts/apply-doc-moves.mjs"
      - "scripts/check-declared-doc-moves.mjs"
      - "scripts/organize-legacy-memory.mjs"
      - "scripts/organize-root-docs.mjs"
      - "scripts/normalize-doc-paths.mjs"
      - "scripts/ensure-doc-index-links.mjs"
      - "scripts/check-doc-system.mjs"
      - "docs/test/doc-system.test.mjs"

permissions:
  contents: write

concurrency:
  group: organize-repository-documents
  cancel-in-progress: false

jobs:
  organize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/glm-blackwell-vertical-slice
          fetch-depth: 1
          show-progress: false
      - name: Validate migration scripts
        run: |
          node --check scripts/apply-doc-moves.mjs
          node --check scripts/check-declared-doc-moves.mjs
          node --check scripts/organize-legacy-memory.mjs
          node --check scripts/organize-root-docs.mjs
          node --check scripts/normalize-doc-paths.mjs
          node --check scripts/ensure-doc-index-links.mjs
          node --check scripts/check-doc-system.mjs
      - name: Organize and reconcile documents
        run: |
          cp scripts/check-doc-system.mjs /tmp/check-doc-system.mjs
          node scripts/apply-doc-moves.mjs docs/legacy-root-moves.json >/tmp/legacy-root-result.json
          node scripts/organize-legacy-memory.mjs >/tmp/legacy-memory-result.json
          node scripts/organize-root-docs.mjs >/tmp/organize-result.json
          cp /tmp/check-doc-system.mjs scripts/check-doc-system.mjs
          node scripts/normalize-doc-paths.mjs >/tmp/normalize-result.json
          node scripts/ensure-doc-index-links.mjs >/tmp/link-result.json
      - name: Validate documentation system
        id: validate_docs
        continue-on-error: true
        run: |
          node scripts/check-declared-doc-moves.mjs > /tmp/doc-validation.json 2>&1
          node scripts/check-doc-system.mjs >> /tmp/doc-validation.json 2>&1
      - name: Upload document validation failure
        if: steps.validate_docs.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: document-validation-failure
          path: /tmp/doc-validation.json
          if-no-files-found: error
      - name: Enforce documentation validation
        if: steps.validate_docs.outcome == 'failure'
        run: |
          cat /tmp/doc-validation.json
          exit 1
      - name: Validate executable plan
        if: steps.validate_docs.outcome == 'success'
        run: |
          node scripts/check-meta-plan.mjs planning/meta-plan-v3.json
          node --test planning/test/meta-plan.test.mjs docs/test/doc-system.test.mjs
          git diff --check
      - name: Commit organized documentation
        if: steps.validate_docs.outcome == 'success'
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No document migration changes remain."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Organize documentation and expand task-surface program"
          git push origin HEAD:agent/glm-blackwell-vertical-slice
