name: Agent production dependency patch

on:
  push:
    branches: [agent/glm-blackwell-vertical-slice]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/glm-blackwell-vertical-slice
      - name: Patch dependency and exact-duplicate boundaries
        run: |
          python - <<'PY'
          from pathlib import Path

          orchestrator = Path('reference/src/production-orchestrator.ts')
          text = orchestrator.read_text()
          old = '  const acceptedSummaries: { pageId: string; route: string; title: string; canonicalQuestion: string }[] = [];\n  for (const batch of input.prepared.siteGenerationPlan.batches) {'
          new = '  const acceptedSummaries: { pageId: string; route: string; title: string; canonicalQuestion: string }[] = [];\n  const sourceExcerptHash = sha256(JSON.stringify([...input.sourceExcerpts].sort((left, right) => left.excerptId.localeCompare(right.excerptId))));\n  for (const batch of input.prepared.siteGenerationPlan.batches) {'
          if old not in text: raise SystemExit('missing accepted summaries insertion point')
          text = text.replace(old, new, 1)
          old = '      design: input.design.authorityHash,\n      provider: sha256(input.provider.id),'
          new = '      design: input.design.authorityHash,\n      provider: sha256(input.provider.id),\n      sources: sourceExcerptHash,\n      priorAcceptedBatches: sha256(JSON.stringify(outputs.map((item) => [item.batchId, sha256(JSON.stringify(item))]))),'
          if old not in text: raise SystemExit('missing stage-two dependencies')
          text = text.replace(old, new, 1)
          old = '    plan: input.prepared.siteGenerationPlan.planHash,\n    design: input.design.authorityHash,\n    drafts: sha256(JSON.stringify(transaction.draftHashes)),'
          new = '    project: input.prepared.project.projectHash,\n    ontology: input.prepared.ontology.ontologyHash,\n    plan: input.prepared.siteGenerationPlan.planHash,\n    design: input.design.authorityHash,\n    baseUrl: sha256(input.baseUrl),\n    drafts: sha256(JSON.stringify(transaction.draftHashes)),'
          if old not in text: raise SystemExit('missing transaction dependencies')
          text = text.replace(old, new, 1)
          old = '  }, corpus.validationHash, { transaction: transaction.transactionHash, embedding: sha256(input.embeddingBackend.id) }, input.generatedAt));'
          new = '  }, corpus.validationHash, { transaction: transaction.transactionHash, embedding: sha256(input.embeddingBackend.id), policy: sha256(JSON.stringify(input.corpusPolicy ?? null)) }, input.generatedAt));'
          if old not in text: raise SystemExit('missing corpus dependencies')
          text = text.replace(old, new, 1)
          orchestrator.write_text(text)

          validator = Path('reference/src/corpus-validation-production.ts')
          text = validator.read_text()
          old = '  const index = buildSparseLexicalIndex(documents);\n  const candidateKeys = boundedLexicalCandidates(index, policy);'
          new = '  const index = buildSparseLexicalIndex(documents);\n  const candidateKeys = boundedLexicalCandidates(index, policy);\n  addExactDuplicateCandidates(documents, candidateKeys);'
          if old not in text: raise SystemExit('missing validator insertion point')
          text = text.replace(old, new, 1)
          marker = 'function boundedLexicalCandidates(index: ReturnType<typeof buildSparseLexicalIndex>, policy: ProductionCorpusValidationPolicy): Set<string> {'
          addition = '''function addExactDuplicateCandidates(documents: readonly { id: string; text: string }[], candidates: Set<string>): void {
  const groups = new Map<string, string[]>();
  for (const document of documents) {
    const hash = sha256(document.text.normalize("NFKC").replace(/\\s+/g, " ").trim().toLowerCase());
    const ids = groups.get(hash) ?? [];
    ids.push(document.id);
    groups.set(hash, ids);
  }
  for (const ids of groups.values()) {
    const ordered = [...ids].sort();
    for (let index = 1; index < ordered.length; index += 1) candidates.add(pairKey(ordered[index - 1], ordered[index]));
  }
}

'''
          if marker not in text: raise SystemExit('missing validator function marker')
          text = text.replace(marker, addition + marker, 1)
          validator.write_text(text)
          PY
          rm .github/workflows/agent-production-dependency-patch.yml
      - name: Commit dependency patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add reference/src/production-orchestrator.ts reference/src/corpus-validation-production.ts .github/workflows/agent-production-dependency-patch.yml
          git commit -m "Harden production checkpoint dependencies"
          git push origin HEAD:agent/glm-blackwell-vertical-slice
