name: Import website framework

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  import:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out destination
        uses: actions/checkout@v4
        with:
          path: destination

      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          repository: benamtech/ai-employee-v1
          ref: agent/ui-metaprogramming-pass-1
          path: source

      - name: Replace destination with website framework
        shell: bash
        run: |
          set -euo pipefail
          find destination -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a source/GTM-RESEARCH/website-framework/. destination/
          rm -rf destination/.github/workflows/import-website-framework.yml

      - name: Commit imported framework
        shell: bash
        run: |
          set -euo pipefail
          cd destination
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import website framework from ai-employee-v1"
          git push origin main
