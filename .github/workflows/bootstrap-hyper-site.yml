name: Bootstrap Hyper Site

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/bootstrap-hyper-site.yml"
  pull_request:
    branches: [main]
    paths:
      - ".bootstrap-trigger"

permissions:
  contents: write

concurrency:
  group: bootstrap-hyper-site
  cancel-in-progress: false

jobs:
  extract:
    if: >-
      (github.event_name == 'push' && github.event.head_commit.message == 'chore: enable hyper-site extraction trigger') ||
      (github.event_name == 'pull_request' && github.head_ref == 'agent/run-bootstrap')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Extract and validate pinned framework
        shell: bash
        run: bash .github/bootstrap-hyper-site.sh
