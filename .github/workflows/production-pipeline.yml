name: Hyper Site Near-Alpha Pipeline

on:
  pull_request:
  push:
    branches: [main, "agent/**"]

permissions:
  contents: read

jobs:
  near-alpha-pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reference
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund --no-package-lock
      - run: npm run build
      - name: Validate operator commands
        run: |
          node --check scripts/production-cli.mjs
          node --check scripts/production-stage1.mjs
          node --check scripts/production-approve.mjs
          node --check scripts/workspace-cli.mjs
          node scripts/production-cli.mjs help
          node scripts/workspace-cli.mjs help
      - name: Run near-alpha boundary tests
        shell: bash
        run: |
          set -o pipefail
          node --test --test-reporter=spec \
            test/production-pipeline.test.mjs \
            test/near-alpha-framework.test.mjs \
            test/near-alpha-release.test.mjs \
            test/agent-workspace.test.mjs \
            2>&1 | tee near-alpha-test.log
      - name: Upload near-alpha test transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: near-alpha-test-log-${{ github.run_id }}
          path: reference/near-alpha-test.log
          if-no-files-found: error
