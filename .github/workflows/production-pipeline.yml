name: Hyper Site Production Pipeline

on:
  pull_request:
  push:
    branches: [main, "agent/**"]

permissions:
  contents: read

jobs:
  production-pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reference
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund --no-package-lock
      - run: npm run build
      - name: Validate operator commands
        run: |
          node --check scripts/production-cli.mjs
          node --check scripts/production-stage1.mjs
          node --check scripts/production-approve.mjs
          node scripts/production-cli.mjs help
      - name: Run production boundary tests
        shell: bash
        run: |
          set -o pipefail
          node --test --test-reporter=spec test/production-pipeline.test.mjs 2>&1 | tee production-test.log
      - name: Upload production test transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-test-log-${{ github.run_id }}
          path: reference/production-test.log
          if-no-files-found: error
